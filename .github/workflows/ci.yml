name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend & AI Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r services/api/requirements.txt

      - name: Run test suite
        run: pytest -v

  backend-lint:
    name: Backend Lint (Ruff)
    runs-on: ubuntu-latest
    # Advisory only until TD-017 (72 pre-existing violations) is cleared in T-014.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff
        run: ruff check .

  frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    # Advisory only until TD-016 (broken ESLint rule reference) is fixed.
    continue-on-error: true
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

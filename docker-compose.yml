services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: tralvana
      POSTGRES_USER: tralvana
      POSTGRES_PASSWORD: tralvana
    ports:
      - "5432:5432"
    volumes:
      - tralvana-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tralvana -d tralvana"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CORS_ORIGINS=http://localhost:3001
      - DATABASE_URL=postgresql+psycopg://tralvana:tralvana@postgres:5432/tralvana
    volumes:
      - ./services/api:/app/services/api
      - ./ai:/app/ai
      - ./travelos:/app/travelos
    depends_on:
      postgres:
        condition: service_healthy
    command: >-
      sh -c "alembic -c services/api/alembic.ini upgrade head &&
      uvicorn app.main:app --app-dir services/api --host 0.0.0.0 --port 8000 --reload"

volumes:
  tralvana-postgres:
